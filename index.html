<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern, accessible to-do list app built with HTML5, CSS3, and vanilla JavaScript."
    />
    <title>Focus List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero__content">
          <p class="eyebrow">Productivity</p>
          <h1>Focus List</h1>
          <p class="hero__subtitle">
            Organize your day with a calm, focused to-do experience.
          </p>
        </div>
      </header>

      <main class="main-content">
        <section class="panel add-task-panel" aria-labelledby="add-task-heading">
          <div class="panel__header">
            <h2 id="add-task-heading">Add a task</h2>
            <p>Press Enter to save your task instantly.</p>
          </div>

          <form id="taskForm" class="task-form" novalidate>
            <label class="sr-only" for="taskInput">Task title</label>
            <input
              id="taskInput"
              name="task"
              type="text"
              maxlength="80"
              autocomplete="off"
              placeholder="What needs to be done?"
              required
            />
            <button class="btn btn--primary" type="submit">Add Task</button>
          </form>
        </section>

        <section class="panel task-panel" aria-labelledby="task-list-heading">
          <div class="task-toolbar">
            <div class="task-summary">
              <h2 id="task-list-heading">Today’s tasks</h2>
              <p id="taskCount" role="status" aria-live="polite">0 tasks left</p>
            </div>

            <div class="toolbar-actions">
              <div class="filters" role="group" aria-label="Task filters">
                <button class="filter-btn is-active" type="button" data-filter="all" aria-pressed="true">All</button>
                <button class="filter-btn" type="button" data-filter="active" aria-pressed="false">Active</button>
                <button class="filter-btn" type="button" data-filter="completed" aria-pressed="false">Completed</button>
              </div>

              <button id="clearCompleted" class="btn btn--ghost" type="button">
                Clear completed
              </button>
            </div>
          </div>

          <ul id="taskList" class="task-list" role="list" aria-live="polite"></ul>
        </section>
      </main>

      <footer class="footer">
        <p>Built with semantic HTML5, CSS3, and vanilla JavaScript.</p>
      </footer>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
